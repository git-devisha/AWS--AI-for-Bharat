<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split It - Simple Bill Splitter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💸 Split It</h1>
            <p class="tagline">Split bills without the awkwardness</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-group">
                    <label for="billAmount">Bill Amount</label>
                    <div class="input-wrapper">
                        <span class="currency">$</span>
                        <input type="number" id="billAmount" placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>

                <div class="input-group">
                    <label for="tipPercent">Tip %</label>
                    <div class="tip-buttons">
                        <button class="tip-btn" data-tip="15">15%</button>
                        <button class="tip-btn active" data-tip="18">18%</button>
                        <button class="tip-btn" data-tip="20">20%</button>
                        <input type="number" id="tipPercent" placeholder="Custom" step="1" min="0" max="100">
                    </div>
                </div>

                <div class="input-group">
                    <label for="numPeople">Number of People</label>
                    <div class="people-control">
                        <button class="control-btn" id="decreasePeople">−</button>
                        <input type="number" id="numPeople" value="2" min="1" max="50">
                        <button class="control-btn" id="increasePeople">+</button>
                    </div>
                </div>
            </div>

            <div class="results">
                <div class="result-card">
                    <span class="result-label">Tip Amount</span>
                    <span class="result-value" id="tipAmount">$0.00</span>
                </div>
                <div class="result-card">
                    <span class="result-label">Total Bill</span>
                    <span class="result-value" id="totalBill">$0.00</span>
                </div>
                <div class="result-card highlight">
                    <span class="result-label">Per Person</span>
                    <span class="result-value large" id="perPerson">$0.00</span>
                </div>
            </div>
        </main>

        <footer>
            <p>Made with ☕ for splitting checks</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
